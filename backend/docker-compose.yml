services:
  postgres:
    image: postgres:16-alpine
    container_name: aura-gold-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aura_gold
    ports:
      - "5433:5432"
    volumes:
      - aura_gold_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aura_gold"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  aura_gold_pg_data:
